# A3C config for Atari Pong
# Based on Mnih et al. [2016] Table S2
#
# Usage:
#   python train.py --algo a3c --env PongNoFrameskip-v4 --config configs/a3c_pong.yaml
#   python train.py --algo a3c --env PongNoFrameskip-v4 --config configs/a3c_pong.yaml --n_workers 8

algorithm:
  lr: 0.0001
  gamma: 0.99
  t_max: 128                 # rollout length per worker before gradient update
  entropy_coef: 0.01         # entropy bonus — keeps policy from collapsing too early
  value_coef: 0.5            # critic loss weight
  max_grad_norm: 40.0
  n_workers: 4               # GPU模式下4-6个worker，避免GPU争用
  seed: 42
  ckpt_interval: 5000      # save checkpoint every N environment steps

training:
  total_steps: 1000000
