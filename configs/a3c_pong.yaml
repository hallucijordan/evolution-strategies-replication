# A3C/A2C config for Atari Pong
# Based on Mnih et al. [2016] Table S2 and Stable Baselines3 A2C Atari defaults
#
# Usage:
#   python train.py --algo a3c --env PongNoFrameskip-v4 --config configs/a3c_pong.yaml

algorithm:
  lr: 0.0007
  gamma: 0.99
  gae_lambda: 1.0            # original A3C paper uses 1.0 (pure n-step returns)
  t_max: 5                   # original paper; small t_max = frequent updates (125K/10M steps)
  entropy_coef: 0.0          # SB3 A2C Atari default; non-zero entropy fights weak actor gradient
  value_coef: 0.25           # SB3 A2C default; prevents critic loss from dominating actor
  max_grad_norm: 0.5
  n_workers: 16              # 5 × 16 = 80 transitions per update
  seed: 42
  ckpt_interval: 50000

training:
  total_steps: 10000000
